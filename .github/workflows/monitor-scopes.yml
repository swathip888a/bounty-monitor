name: Monitor Bug Bounty Scope Changes

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Create data directory
        run: mkdir -p data
        
      - name: Run scope monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python << 'EOF'
          import json
          import requests
          import os
          from datetime import datetime
          from pathlib import Path
          
          DISCORD_WEBHOOK = os.environ.get('DISCORD_WEBHOOK')
          PLATFORMS = ["hackerone", "bugcrowd", "yeswehack", "intigriti", "federacy"]
          DATA_DIR = Path("data")
          
          print(f"🔍 Starting scan at {datetime.utcnow().isoformat()}")
          print("=" * 50)
          
          for platform in PLATFORMS:
              print(f"\n📡 Checking {platform.title()}...")
              
              url = f"https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/{platform}_data.json"
              try:
                  response = requests.get(url, timeout=30)
                  response.raise_for_status()
                  curr_data = response.json()
              except Exception as e:
                  print(f"❌ Error fetching {platform}: {e}")
                  continue
              
              file_path = DATA_DIR / f"{platform}_data.json"
              prev_data = None
              if file_path.exists():
                  with open(file_path, 'r') as f:
                      prev_data = json.load(f)
              
              with open(file_path, 'w') as f:
                  json.dump(curr_data, f, indent=2)
              
              if not prev_data:
                  print(f"   First run - saved baseline for {platform}")
                  continue
              
              changes = []
              prev_programs = {}
              curr_programs = {}
              
              if 'programs' in prev_data:
                  for prog in prev_data['programs']:
                      prev_programs[prog.get('name', '')] = set(prog.get('scopes', []))
              
              if 'programs' in curr_data:
                  for prog in curr_data['programs']:
                      curr_programs[prog.get('name', '')] = set(prog.get('scopes', []))
              
              for prog_name, curr_scopes in curr_programs.items():
                  prev_scopes = prev_programs.get(prog_name, set())
                  new_scopes = curr_scopes - prev_scopes
                  if new_scopes:
                      changes.append({'program': prog_name, 'scopes': list(new_scopes), 'type': 'new_scope'})
              
              for prog_name in curr_programs.keys() - prev_programs.keys():
                  changes.append({'program': prog_name, 'scopes': list(curr_programs[prog_name]), 'type': 'new_program'})
              
              if changes:
                  print(f"   🎯 Found {len(changes)} change(s)!")
                  for change in changes:
                      print(f"      → {change['program']}: {len(change['scopes'])} new scope(s)")
                      
                      if DISCORD_WEBHOOK:
                          emojis = {'hackerone': '🟠', 'bugcrowd': '🐞', 'yeswehack': '✅', 'intigriti': '🔷', 'federacy': '⚡'}
                          emoji = emojis.get(platform, '📢')
                          
                          header = f"{emoji} **NEW PROGRAM ADDED!**" if change['type'] == 'new_program' else f"{emoji} **New Scope Added**"
                          
                          scopes_text = "\n".join([f"• `{s}`" for s in change['scopes'][:10]])
                          if len(change['scopes']) > 10:
                              scopes_text += f"\n• *and {len(change['scopes']) - 10} more...*"
                          
                          payload = {
                              "embeds": [{
                                  "title": header,
                                  "color": 0x00ff00,
                                  "fields": [
                                      {"name": "Platform", "value": platform.title(), "inline": True},
                                      {"name": "Program", "value": change['program'], "inline": True},
                                      {"name": "Added Scopes", "value": scopes_text, "inline": False},
                                      {"name": "Time", "value": datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC'), "inline": False}
                                  ],
                                  "footer": {"text": "Bounty Monitor • Checks every 30 mins"}
                              }]
                          }
                          
                          try:
                              requests.post(DISCORD_WEBHOOK, json=payload)
                              print(f"         ✅ Notification sent to Discord")
                          except Exception as e:
                              print(f"         ❌ Discord error: {e}")
              else:
                  print(f"   No changes detected")
          
          print("\n" + "=" * 50)
          print("✅ Scan completed")
          EOF
          
      - name: Save baseline data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update baseline data" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git || echo "Push skipped - no changes"
